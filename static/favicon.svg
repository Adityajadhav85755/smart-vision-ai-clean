<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffa3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with subtle border -->
  <circle cx="16" cy="16" r="14" fill="url(#bgGradient)" stroke="#00d4ff" stroke-width="0.5" opacity="0.95"/>
  
  <!-- Eye shape - main vision element -->
  <ellipse cx="16" cy="16" rx="8" ry="5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.9"/>
  <circle cx="16" cy="16" r="3" fill="#ffffff" opacity="0.95"/>
  
  <!-- Lens/scanner ring - AI scanning element -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#coreGradient)" stroke-width="0.8" opacity="0.7" stroke-dasharray="2 1.5"/>
  
  <!-- AI core nodes - representing smart processing -->
  <circle cx="12" cy="12" r="1.2" fill="#00ffa3" opacity="0.8"/>
  <circle cx="20" cy="12" r="1.2" fill="#00ffa3" opacity="0.8"/>
  <circle cx="12" cy="20" r="1.2" fill="#00ffa3" opacity="0.8"/>
  <circle cx="20" cy="20" r="1.2" fill="#00ffa3" opacity="0.8"/>
  
  <!-- Subtle scanning lines -->
  <path d="M8 16 L24 16" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <path d="M16 8 L16 24" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  
  <!-- SV monogram (subtle) -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="#00d4ff" opacity="0.6">SV</text>
</svg>
