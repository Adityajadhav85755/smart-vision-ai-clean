<!DOCTYPE html>
<html>
<head>
    <title>Smart Vision AI - Smart Recommendations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Upload Section */
        .upload-section {
            text-align: center;
            padding: 40px;
            border: 3px dashed #667eea;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: all 0.3s;
            background: linear-gradient(135deg, #f6f9fc 0%, #ffffff 100%);
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .upload-section input {
            display: none;
        }

        .upload-section label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .upload-section label:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .file-name {
            margin-top: 15px;
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 20px auto;
            width: fit-content;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .analyze-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #218838, #1eac8c);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }

        .analyze-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .preview-section {
            margin: 30px 0;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .preview-section img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        /* Summary Section */
        .summary-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .summary-section h3 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
        }

        .summary-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        .summary-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .summary-info {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        /* Results Grid */
        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .detection-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 6px solid;
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .detection-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .detection-card.usable {
            border-left-color: #28a745;
        }

        .detection-card.obstacle {
            border-left-color: #dc3545;
        }

        .detection-card.neutral {
            border-left-color: #ffc107;
        }

        .detection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .detection-class {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }

        .detection-confidence {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .detection-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .status-usable {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-obstacle {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-neutral {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .detection-recommendation {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        /* Smart Recommendations Styles */
        .smart-recommendations {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f6f9fc 0%, #ffffff 100%);
            border-radius: 15px;
            border: 2px solid #667eea;
            animation: fadeIn 0.5s ease;
        }

        .reuse-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #333;
            font-size: 1.2rem;
            font-weight: 700;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .reuse-header i {
            color: #28a745;
            font-size: 1.8rem;
        }

        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .idea-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .idea-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        .idea-card h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .idea-card p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .step-guide {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
        }

        .step-guide h4 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
        }

        .step-guide ol {
            margin-left: 25px;
            color: #666;
            line-height: 1.8;
        }

        .step-guide li {
            margin-bottom: 8px;
        }

        .location-badge {
            display: inline-block;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px;
            font-size: 0.85rem;
            margin: 4px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .safety-tip {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            color: #e65100;
            font-size: 0.95rem;
            margin-top: 15px;
            border-left: 4px solid #ff9800;
        }

        .recycling-guide {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            color: #2e7d32;
            font-size: 0.95rem;
            margin-top: 15px;
            border-left: 4px solid #4caf50;
        }

        .eco-tip {
            background: linear-gradient(135deg, #f1f8e9, #ffffff);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px dashed #8bc34a;
        }

        .eco-tip i {
            font-size: 2.5rem;
            color: #8bc34a;
        }

        .eco-tip p {
            color: #33691e;
            font-weight: 500;
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .expand-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: all 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .expand-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            margin: 40px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading p {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Error Message */
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
            border-left: 4px solid #dc3545;
        }

        .error-message.active {
            display: block;
            animation: shake 0.5s ease;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .results-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .upload-section {
                padding: 25px;
            }

            .upload-section label {
                padding: 12px 25px;
                font-size: 16px;
            }

            .analyze-btn {
                padding: 12px 30px;
                font-size: 16px;
            }

            .results-section {
                grid-template-columns: 1fr;
            }

            .ideas-grid {
                grid-template-columns: 1fr;
            }

            .eco-tip {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
                flex-direction: column;
            }

            .detection-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .detection-confidence {
                align-self: flex-start;
            }

            .location-badge {
                display: block;
                text-align: center;
            }

            .reuse-header {
                flex-direction: column;
                text-align: center;
            }
        }
        
        /* Detection Statistics Styles */
        .stats-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .ratio-chart {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        #ratioChart {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <h1>🤖 <span>Smart Vision AI</span> - Intelligent Reuse Advisor</h1>
        
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <label for="imageInput">
                <i class="fas fa-cloud-upload-alt"></i> Upload Image for Smart Analysis
            </label>
            <div class="file-name" id="fileName">
                <i class="far fa-file-image"></i> No file chosen
            </div>
        </div>
        
        <button class="analyze-btn" id="analyzeBtn" onclick="detect()" disabled>
            <i class="fas fa-magic"></i> Analyze & Get Smart Recommendations
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>🤖 AI is analyzing your image and generating creative reuse ideas...</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i> <span></span>
        </div>
        
        <div class="preview-section" id="preview"></div>
        
        <div id="summary"></div>
        <div class="results-section" id="results"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileName = document.getElementById('fileName');
        const preview = document.getElementById('preview');
        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const errorSpan = errorMessage.querySelector('span');

        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileName.innerHTML = `<i class="far fa-file-image"></i> ${this.files[0].name}`;
                analyzeBtn.disabled = false;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(this.files[0]);
            } else {
                fileName.innerHTML = '<i class="far fa-file-image"></i> No file chosen';
                analyzeBtn.disabled = true;
                preview.innerHTML = '';
            }
        });

        function detect() {
            const file = imageInput.files[0];
            if (!file) {
                showError('Please select an image first');
                return;
            }

            results.innerHTML = '';
            summary.innerHTML = '';
            errorMessage.classList.remove('active');
            loading.classList.add('active');
            analyzeBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Display summary with eco tips
                if (data.summary && data.summary.length > 0) {
                    let summaryHtml = '<div class="summary-section"><h3><i class="fas fa-chart-line"></i> Scene Analysis</h3>';
                    data.summary.forEach(item => {
                        if (item.includes('Eco-Tip')) {
                            summaryHtml += `<div class="eco-tip"><i class="fas fa-leaf"></i><p>${item.replace('🌱 ', '')}</p></div>`;
                        } else {
                            const type = item.includes('⚠️') ? 'warning' : 'info';
                            summaryHtml += `<div class="summary-item summary-${type}"><i class="fas ${type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> ${item}</div>`;
                        }
                    });
                    summaryHtml += '</div>';
                    summary.innerHTML = summaryHtml;
                }

                // Update preview
                if (data.image_data) {
                    preview.innerHTML = `<img src="${data.image_data}" alt="Annotated Result">`;
                }

                // Display detections with smart recommendations
                let resultsHtml = '';
                data.detections.forEach(det => {
                    let smartRecsHtml = '';
                    
                    if (det.smart_recommendations) {
                        const rec = det.smart_recommendations;
                        
                        if (rec.status === 'usable') {
                            smartRecsHtml = `
                                <div class="smart-recommendations">
                                    <div class="reuse-header">
                                        <i class="fas fa-lightbulb"></i>
                                        <span>✨ Creative Reuse Ideas for ${rec.name}</span>
                                    </div>
                                    
                                    <div class="ideas-grid">
                                        ${rec.reuse_ideas.map(idea => `
                                            <div class="idea-card">
                                                <h4><i class="fas fa-star"></i> Idea</h4>
                                                <p>${idea}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                    
                                    <div style="margin: 15px 0;">
                                        <h4 style="color: #666; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;">
                                            <i class="fas fa-map-marker-alt" style="color: #667eea;"></i> Where to Use:
                                        </h4>
                                        <div>
                                            ${rec.usage_locations.map(loc => 
                                                `<span class="location-badge"><i class="fas fa-check"></i> ${loc}</span>`
                                            ).join('')}
                                        </div>
                                    </div>
                                    
                                    <div class="step-guide">
                                        <h4><i class="fas fa-list-ol" style="color: #667eea;"></i> Step-by-Step Guide</h4>
                                        <p style="white-space: pre-line; color: #666;">${rec.step_by_step_guide}</p>
                                    </div>
                                </div>
                            `;
                        } else {
                            smartRecsHtml = `
                                <div class="smart-recommendations" style="border-color: #dc3545;">
                                    <div class="reuse-header" style="color: #dc3545;">
                                        <i class="fas fa-exclamation-triangle"></i>
                                        <span>⚠️ Disposal Guide for ${rec.name}</span>
                                    </div>
                                    
                                    <div class="recycling-guide">
                                        <i class="fas fa-recycle"></i>
                                        <strong>Recycling Guide:</strong> ${rec.recycling_guide || 'Check local recycling guidelines'}
                                    </div>
                                    
                                    <div class="safety-tip">
                                        <i class="fas fa-shield-alt"></i>
                                        <strong>Safety Tips:</strong> ${rec.safety_tips || 'Handle with care'}
                                    </div>
                                    
                                    <div style="margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                                        <i class="fas fa-trash-alt" style="color: #dc3545;"></i>
                                        <strong style="color: #333;"> Proper Disposal:</strong> 
                                        <span style="color: #666;">${rec.disposal_method || 'Take to appropriate recycling center'}</span>
                                    </div>
                                </div>
                            `;
                        }
                    }
                    
                    resultsHtml += `
                        <div class="detection-card ${det.status}">
                            <div class="detection-header">
                                <span class="detection-class">${det.class}</span>
                                <span class="detection-confidence">${det.confidence}%</span>
                            </div>
                            <div class="detection-status status-${det.status}">
                                <i class="fas ${det.status === 'usable' ? 'fa-check-circle' : det.status === 'obstacle' ? 'fa-exclamation-triangle' : 'fa-circle'}"></i>
                                ${det.status}
                            </div>
                            <div class="detection-recommendation">
                                <i class="fas fa-lightbulb" style="color: #667eea;"></i> ${det.recommendation}
                            </div>
                            ${smartRecsHtml}
                        </div>
                    `;
                });
                
                if (data.detections.length === 0) {
                    resultsHtml = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: white; border-radius: 20px;">
                            <i class="fas fa-search" style="font-size: 3rem; color: #667eea; margin-bottom: 20px;"></i>
                            <p style="color: #666; font-size: 1.2rem;">No objects detected in the image.</p>
                            <p style="color: #999; margin-top: 10px;">Try uploading a clearer image with common objects.</p>
                        </div>
                    `;
                }
                
                results.innerHTML = resultsHtml;
            })
            .catch(error => {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;
                showError('Error analyzing image: ' + error.message);
            });
        }

        function showError(message) {
            errorSpan.textContent = message;
            errorMessage.classList.add('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 5000);
        }

        // Drag and drop functionality
        const uploadSection = document.querySelector('.upload-section');

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'linear-gradient(135deg, #f0f2ff, #ffffff)';
            uploadSection.style.borderColor = '#764ba2';
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.background = 'linear-gradient(135deg, #f6f9fc 0%, #ffffff 100%)';
            uploadSection.style.borderColor = '#667eea';
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'linear-gradient(135deg, #f6f9fc 0%, #ffffff 100%)';
            uploadSection.style.borderColor = '#667eea';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const fakeEvent = { target: { files: [file] } };
                imageInput.files = e.dataTransfer.files;
                imageInput.dispatchEvent(new Event('change'));
            } else {
                showError('Please drop an image file.');
            }
        });
        
        function updateDetectionStats(detections) {
            const statsSection = document.getElementById('detectionStats');
            if (!detections || detections.length === 0) {
                statsSection.style.display = 'none';
                return;
            }
            
            statsSection.style.display = 'block';
            
            const totalObjects = detections.length;
            const usableItems = detections.filter(det => det.status === 'usable').length;
            const nonUsableItems = totalObjects - usableItems;
            const usableRatio = totalObjects > 0 ? Math.round((usableItems / totalObjects) * 100) : 0;
            
            // Update text statistics
            document.getElementById('totalObjects').textContent = totalObjects;
            document.getElementById('usableItems').textContent = usableItems;
            document.getElementById('nonUsableItems').textContent = nonUsableItems;
            document.getElementById('usableRatio').textContent = usableRatio + '%';
            
            // Create pie chart
            createRatioChart(usableItems, nonUsableItems);
        }
        
        function createRatioChart(usable, nonUsable) {
            const canvas = document.getElementById('ratioChart');
            const ctx = canvas.getContext('2d');
            
            // Clear previous chart
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const total = usable + nonUsable;
            if (total === 0) return;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 20;
            
            // Draw usable slice (green)
            const usableAngle = (usable / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, -Math.PI/2, -Math.PI/2 + usableAngle);
            ctx.closePath();
            ctx.fillStyle = '#10b981';
            ctx.fill();
            
            // Draw non-usable slice (red)
            const nonUsableAngle = (nonUsable / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, -Math.PI/2 + usableAngle, -Math.PI/2 + usableAngle + nonUsableAngle);
            ctx.closePath();
            ctx.fillStyle = '#ef4444';
            ctx.fill();
            
            // Draw border
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw labels
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Usable label
            if (usable > 0) {
                const usableLabelAngle = -Math.PI/2 + (usableAngle / 2);
                const labelX = centerX + Math.cos(usableLabelAngle) * (radius * 0.7);
                const labelY = centerY + Math.sin(usableLabelAngle) * (radius * 0.7);
                ctx.fillText(usable + ' usable', labelX, labelY);
            }
            
            // Non-usable label
            if (nonUsable > 0) {
                const nonUsableLabelAngle = -Math.PI/2 + usableAngle + (nonUsableAngle / 2);
                const labelX = centerX + Math.cos(nonUsableLabelAngle) * (radius * 0.7);
                const labelY = centerY + Math.sin(nonUsableLabelAngle) * (radius * 0.7);
                ctx.fillText(nonUsable + ' non-usable', labelX, labelY);
            }
        }
    </script>
</body>
</html>

        const analyzeBtn = document.getElementById('analyzeBtn');

        const summary = document.getElementById('summary');

        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileName.textContent = this.files[0].name;
                analyzeBtn.disabled = false;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(this.files[0]);
            } else {
                fileName.textContent = 'No file chosen';
                analyzeBtn.disabled = true;
                preview.innerHTML = '';
            }
        });

        function detect() {
            const file = imageInput.files[0];
            if (!file) {
                showError('Please select an image first');
                return;
            }

            // Reset displays
            results.innerHTML = '';
            summary.innerHTML = '';
            errorMessage.classList.remove('active');
            loading.classList.add('active');
            analyzeBtn.disabled = true;

            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Display summary
                if (data.summary && data.summary.length > 0) {
