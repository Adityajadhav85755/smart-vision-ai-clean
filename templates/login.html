<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Smart Vision AI</title>
    <!-- Favicon - Optimized for fast loading -->
    <link rel="preconnect" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="32x32">
    <link rel="shortcut icon" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="192x192">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="512x512">
    <meta name="theme-color" content="#6366f1">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/crypto-polyfill.js') }}"></script>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%), url('/static/photos/img.jpg');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: clamp(12px, 3vw, 20px);

        }

        .navbar {

            background: rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(10px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.2);

            padding: clamp(12px, 2vw, 15px) clamp(15px, 3vw, 20px);

            position: fixed;

            top: 0;

            width: 100%;

            z-index: 1000;

        }

        .navbar-content {

            display: flex;

            justify-content: space-between;

            align-items: center;

            max-width: 1200px;

            margin: 0 auto;

        }

        .navbar-brand {

            color: white;

            font-size: clamp(1.2rem, 2vw, 1.5rem);

            font-weight: bold;

            display: flex;

            align-items: center;

            gap: clamp(8px, 1vw, 10px);

            text-decoration: none;

        }

        .navbar-links {

            display: flex;

            gap: clamp(15px, 3vw, 30px);

            align-items: center;

            list-style: none;

        }

        .navbar-links a {

            color: white;

            text-decoration: none;

            transition: all 0.3s ease;

            font-size: clamp(0.8rem, 1.5vw, 0.95rem);

            display: flex;

            align-items: center;

            gap: clamp(6px, 1vw, 8px);

        }

        .navbar-links a:hover {

            opacity: 0.7;

        }

        .navbar-btn {

            background: white;

            color: #667eea;

            padding: clamp(6px, 1vw, 8px) clamp(15px, 2vw, 20px);

            border-radius: 50px;

            text-decoration: none;

            font-weight: bold;

            transition: transform 0.3s ease;

        }

        .navbar-btn:hover {

            transform: translateY(-2px);

        }

        .navbar-btn.signup {

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

            color: white;

        }

        .navbar-btn.login {

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

            color: white;

        }

        .navbar-btn.login:hover {

            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);

            transform: translateY(-2px);

        }

        .container {

            background: white;

            border-radius: 20px;

            padding: clamp(30px, 5vw, 50px);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

            width: 100%;

            max-width: 450px;

            margin-top: clamp(60px, 8vw, 80px);

        }

        .login-header {

            text-align: center;

            margin-bottom: clamp(30px, 5vw, 40px);

        }

        .login-header h1 {

            color: #333;

            font-size: clamp(1.5rem, 3vw, 2rem);

            margin-bottom: clamp(8px, 1vw, 10px);

        }

        .login-header p {

            color: #666;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .form-group {

            margin-bottom: clamp(18px, 3vw, 25px);

        }

        .form-group label {

            display: block;

            color: #333;

            font-weight: 600;

            margin-bottom: clamp(8px, 1vw, 10px);

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .form-group input {

            width: 100%;

            padding: clamp(11px, 2vw, 14px) clamp(12px, 2vw, 15px);

            border: 2px solid #ddd;

            border-radius: 10px;

            font-family: inherit;

            font-size: clamp(0.9rem, 1.5vw, 0.95rem);

            transition: all 0.3s ease;

        }

        .form-group input:focus {

            outline: none;

            border-color: #667eea;

            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);

        }

        .login-btn {

            width: 100%;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            color: white;

            border: none;

            padding: clamp(11px, 2vw, 14px);

            font-size: clamp(0.95rem, 1.5vw, 1.05rem);

            border-radius: 10px;

            cursor: pointer;

            font-weight: 600;

            transition: all 0.3s ease;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: clamp(8px, 1vw, 10px);

        }

        .login-btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);

        }

        .login-btn:active {

            transform: translateY(0);

        }

        .message {

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            text-align: center;

            font-weight: 500;

            display: none;

        }

        .message.error {

            background: #f8d7da;

            color: #721c24;

            border: 1px solid #f5c6cb;

            display: block;

        }

        .message.success {

            background: #d4edda;

            color: #155724;

            border: 1px solid #c3e6cb;

            display: block;

        }

        .signup-link {

            text-align: center;

            margin-top: clamp(15px, 2vw, 20px);

            color: #666;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .signup-link a {

            color: #667eea;

            text-decoration: none;

            font-weight: 600;

            transition: color 0.3s ease;

        }

        .signup-link a:hover {

            color: #764ba2;

            text-decoration: underline;

        }

        .loading {

            display: none;

            opacity: 0.6;

            pointer-events: none;

        }

        .spinner {

            display: inline-block;

            width: 20px;

            height: 20px;

            border: 3px solid rgba(255, 255, 255, 0.3);

            border-radius: 50%;

            border-top-color: white;

            animation: spin 0.8s linear infinite;

        }

        /* Role Selector Styles */

        .role-selector {

            display: flex;

            gap: clamp(10px, 2vw, 15px);

            margin-bottom: clamp(20px, 3vw, 30px);

            border-bottom: 2px solid #ddd;

            padding: 0 0 clamp(15px, 2vw, 20px) 0;

        }

        .role-btn {

            flex: 1;

            padding: clamp(10px, 1.5vw, 12px) clamp(15px, 2vw, 20px);

            border: none;

            background: transparent;

            color: #999;

            font-weight: 600;

            cursor: pointer;

            transition: all 0.3s ease;

            border-bottom: 3px solid transparent;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

            display: flex;

            align-items: center;

            justify-content: center;

            gap: clamp(6px, 1vw, 8px);

        }

        .role-btn:hover {

            color: #667eea;

        }

        .role-btn.active {

            color: #667eea;

            border-bottom-color: #667eea;

        }

        .role-btn.admin.active {

            color: #f5576c;

            border-bottom-color: #f5576c;

        }

        /* Login Form Styles */

        .login-form {

            display: none;

        }

        .login-form.active {

            display: block;

            animation: fadeIn 0.3s ease;

        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(10px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        .admin-btn {

            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);

        }

        .admin-btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);

        }

        @keyframes spin {

            to { transform: rotate(360deg); }

        }

        /* Popup Modal Styles */

        .popup-overlay {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.5);

            display: flex;

            justify-content: center;

            align-items: center;

            z-index: 9999;

            opacity: 0;

            visibility: hidden;

            transition: all 0.3s ease;

        }

        

        .popup-overlay.show {

            opacity: 1;

            visibility: visible;

        }

        

        .popup-modal {

            background: white;

            border-radius: 15px;

            padding: 0;

            max-width: 450px;

            width: 90%;

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

            transform: scale(0.7);

            transition: all 0.3s ease;

            overflow: hidden;

        }

        

        .popup-overlay.show .popup-modal {

            transform: scale(1);

        }

        

        .popup-header {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            color: white;

            padding: 20px;

            display: flex;

            justify-content: space-between;

            align-items: center;

        }

        

        .popup-header h3 {

            margin: 0;

            font-size: 18px;

            font-weight: 600;

        }

        

        .popup-close {

            background: none;

            border: none;

            color: white;

            font-size: 18px;

            cursor: pointer;

            padding: 5px;

            border-radius: 50%;

            width: 30px;

            height: 30px;

            display: flex;

            justify-content: center;

            align-items: center;

            transition: all 0.3s ease;

        }

        

        .popup-close:hover {

            background: rgba(255, 255, 255, 0.2);

        }

        

        .popup-content {

            padding: 25px 20px;

            text-align: center;

        }

        

        .popup-content p {

            margin: 0;

            color: #333;

            font-size: 16px;

            line-height: 1.5;

        }

        

        .popup-actions {

            padding: 0 20px 20px;

            display: flex;

            gap: 10px;

            justify-content: center;

        }

        

        .popup-btn {

            padding: 12px 25px;

            border: none;

            border-radius: 8px;

            font-size: 14px;

            font-weight: 600;

            cursor: pointer;

            transition: all 0.3s ease;

            min-width: 100px;

        }

        

        .popup-btn-primary {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            color: white;

        }

        

        .popup-btn-primary:hover {

            transform: translateY(-2px);

            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);

        }

        

        .popup-btn-secondary {

            background: #f8f9fa;

            color: #6c757d;

            border: 1px solid #dee2e6;

        }

        

        .popup-btn-secondary:hover {

            background: #e9ecef;

        }

        @media (max-width: 1024px) {

            .container {

                max-width: 500px;

            }

            .navbar-links {

                gap: clamp(12px, 2vw, 20px);

            }

        }

        @media (max-width: 768px) {

            .navbar-links {

                gap: clamp(8px, 1.5vw, 15px);

                flex-wrap: wrap;

            }

            .container {

                padding: clamp(25px, 4vw, 40px);

                margin-top: clamp(70px, 10vw, 90px);

            }

            .login-header h1 {

                font-size: clamp(1.3rem, 2.5vw, 1.7rem);

            }

        }

        @media (max-width: 480px) {

            .container {

                padding: clamp(20px, 3vw, 30px);

                margin-top: clamp(60px, 8vw, 70px);

                max-width: 100%;

            }

            .login-header h1 {

                font-size: clamp(1.2rem, 2.5vw, 1.5rem);

            }

            .navbar-links {

                gap: 8px;

            }

        }

        @media (max-width: 360px) {

            .navbar-brand {

                font-size: clamp(1rem, 2vw, 1.2rem);

            }

            .navbar-links a {

                font-size: clamp(0.7rem, 1vw, 0.8rem);

            }

            .login-header h1 {

                font-size: clamp(1.1rem, 2vw, 1.3rem);

            }

            .container {

                margin-top: clamp(55px, 8vw, 60px);

            }

        }

    </style>

</head>

<body>

    <nav class="navbar">

        <div class="navbar-content">

            <a href="/" class="navbar-brand">

                <i class="fas fa-robot"></i> Smart Vision AI

            </a>

            <ul class="navbar-links">

                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>

                <li><a href="/detection"><i class="fas fa-gears"></i> Detection</a></li>

                <li><a href="/features"><i class="fas fa-sparkles"></i> Features</a></li>

                <li><a href="/about"><i class="fas fa-info-circle"></i> About</a></li>

                <li><a href="/contact"><i class="fas fa-envelope"></i> Contact</a></li>

                <li><a href="/signup_page" class="navbar-btn signup"><i class="fas fa-user-plus"></i> Sign Up</a></li>

            </ul>

        </div>

    </nav>

    <div class="container">

        <div class="login-header">

            <h1><i class="fas fa-sign-in-alt"></i> Login</h1>

            <p>Access your Smart Vision AI account</p>

        </div>

        <!-- Role Selector -->

        <div class="role-selector">

            <button class="role-btn active" id="studentRoleBtn" onclick="switchRole('student')">

                <i class="fas fa-user-graduate"></i> Student

            </button>

            <button class="role-btn" id="adminRoleBtn" onclick="switchRole('admin')">

                <i class="fas fa-user-shield"></i> Administrator

            </button>

        </div>

        <!-- Student Login Form -->

        <form id="studentForm" onsubmit="handleLogin(event, 'student')" class="login-form active">

            <div class="form-group">

                <label for="studentEmail">Email Address</label>

                <input

                    type="email"

                    id="studentEmail"

                    placeholder="Enter your email"

                    required

                >

            </div>

            <div class="form-group">

                <label for="studentPassword">Password</label>

                <input

                    type="password"

                    id="studentPassword"

                    placeholder="Enter your password"

                    required

                >

            </div>

            <button type="submit" class="login-btn" id="studentLoginBtn">

                <i class="fas fa-lock"></i> Login as Student

            </button>

        </form>

        <!-- Admin Login Form -->

        <form id="adminForm" onsubmit="handleLogin(event, 'admin')" class="login-form">

            <div class="form-group">

                <label for="adminEmail">Admin Email Address</label>

                <input

                    type="email"

                    id="adminEmail"

                    placeholder="Enter admin email"

                    required

                >

            </div>

            <div class="form-group">

                <label for="adminPassword">Admin Password</label>

                <input

                    type="password"

                    id="adminPassword"

                    placeholder="Enter admin password"

                    required

                >

            </div>

            <button type="submit" class="login-btn admin-btn" id="adminLoginBtn">

                <i class="fas fa-lock"></i> Login as Administrator

            </button>

        </form>

        <div class="message" id="msg"></div>

        <div class="signup-link">

            Don't have an account? <a href="/signup_page">Sign up now</a>

        </div>

    </div>

    

    <!-- Popup Modal -->

    <div class="popup-overlay" id="popupOverlay">

        <div class="popup-modal">

            <div class="popup-header">

                <h3 id="popupTitle">Notification</h3>

                <button class="popup-close" id="popupClose">

                    <i class="fas fa-times"></i>

                </button>

            </div>

            <div class="popup-content">

                <p id="popupMessage">This is a popup message.</p>

            </div>

            <div class="popup-actions">

                <button class="popup-btn popup-btn-primary" id="popupPrimaryBtn">OK</button>

                <button class="popup-btn popup-btn-secondary" id="popupSecondaryBtn" style="display: none;">Cancel</button>

            </div>

        </div>

    </div>

    

    <script>

        let currentRole = 'student';

        function switchRole(role) {

            currentRole = role;

            // Update buttons

            document.getElementById('studentRoleBtn').classList.toggle('active');

            document.getElementById('adminRoleBtn').classList.toggle('active', role === 'admin');

            document.getElementById('adminRoleBtn').classList.toggle('active');

            document.getElementById('studentRoleBtn').classList.toggle('active', role === 'student');

            // Update forms

            document.getElementById('studentForm').classList.toggle('active');

            document.getElementById('adminForm').classList.toggle('active');

            // Clear messages

            document.getElementById('msg').className = 'message';

            document.getElementById('msg').innerHTML = '';

        }

        function handleLogin(event, role) {

            event.preventDefault();

            const emailInput = role === 'student' ? 'studentEmail' : 'adminEmail';

            const passwordInput = role === 'student' ? 'studentPassword' : 'adminPassword';

            const buttonId = role === 'student' ? 'studentLoginBtn' : 'adminLoginBtn';

            const email = document.getElementById(emailInput).value.trim();

            const password = document.getElementById(passwordInput).value;

            const loginBtn = document.getElementById(buttonId);

            const msgDiv = document.getElementById('msg');

            if (!email || !password) {

                msgDiv.className = 'message error';

                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill in all fields';

                return;

            }

            // Show loading state

            loginBtn.classList.add('loading');

            const btnText = role === 'student' ? 'Logging in...' : 'Authenticating...';

            loginBtn.innerHTML = '<div class="spinner"></div> ' + btnText;

            // Determine endpoint based on role

            const endpoint = role === 'student' ? '/student_login' : '/admin_login';

            fetch(endpoint, {

                method: 'POST',

                headers: {'Content-Type': 'application/json'},

                body: JSON.stringify({

                    email: email,

                    password: password

                })

            })

            .then(res => res.json())

            .then(data => {

                loginBtn.classList.remove('loading');

                const btnText = role === 'student' ? '<i class="fas fa-lock"></i> Login as Student' : '<i class="fas fa-lock"></i> Login as Administrator';

                loginBtn.innerHTML = btnText;

                if (data.success) {

                    msgDiv.className = 'message success';

                    msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';

                    // Store role in localStorage

                    localStorage.setItem('userRole', role);

                    localStorage.setItem('userEmail', email);

                    setTimeout(() => {

                        // Redirect based on role

                        const redirectUrl = role === 'student' ? '/dashboard' : '/admin';

                        window.location.href = redirectUrl;

                    }, 1500);

                } else {

                    msgDiv.className = 'message error';

                    msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (data.message || 'Login failed');

                }

            })

            .catch(error => {

                loginBtn.classList.remove('loading');

                const btnText = role === 'student' ? '<i class="fas fa-lock"></i> Login as Student' : '<i class="fas fa-lock"></i> Login as Administrator';

                loginBtn.innerHTML = btnText;

                msgDiv.className = 'message error';

                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Please try again.';

                console.error('Error:', error);

            });

        }

        

        // Popup Modal Functions

        function showPopup(title, message, primaryCallback, secondaryCallback, primaryText = 'OK', secondaryText = 'Cancel') {

            const overlay = document.getElementById('popupOverlay');

            const titleEl = document.getElementById('popupTitle');

            const messageEl = document.getElementById('popupMessage');

            const primaryBtn = document.getElementById('popupPrimaryBtn');

            const secondaryBtn = document.getElementById('popupSecondaryBtn');

            

            titleEl.textContent = title;

            messageEl.textContent = message;

            primaryBtn.textContent = primaryText;

            secondaryBtn.textContent = secondaryText;

            

            if (secondaryCallback) {

                secondaryBtn.style.display = 'block';

                secondaryBtn.onclick = () => {

                    hidePopup();

                    secondaryCallback();

                };

            } else {

                secondaryBtn.style.display = 'none';

            }

            

            primaryBtn.onclick = () => {

                hidePopup();

                if (primaryCallback) primaryCallback();

            };

            

            overlay.classList.add('show');

        }

        

        function hidePopup() {

            const overlay = document.getElementById('popupOverlay');

            overlay.classList.remove('show');

        }

        

        // Close popup when clicking overlay

        document.getElementById('popupOverlay').addEventListener('click', function(e) {

            if (e.target === this) {

                hidePopup();

            }

        });

        

        // Close popup with X button

        document.getElementById('popupClose').addEventListener('click', hidePopup);

        

        // Example usage - remove this in production

        // showPopup('Welcome!', 'This is a sample popup message.', () => {

        //     console.log('Popup confirmed!');

        // });

        

    </script>

</body>

</html>
