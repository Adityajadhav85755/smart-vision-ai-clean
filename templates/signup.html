<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up - Smart Vision AI</title>
    <!-- Favicon - Optimized for fast loading -->
    <link rel="preconnect" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="32x32">
    <link rel="shortcut icon" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='photos/images.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="192x192">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='photos/images.png') }}" sizes="512x512">
    <meta name="theme-color" content="#6366f1">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/crypto-polyfill.js') }}"></script>

    <style>
        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%), url('/static/photos/img.jpg');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: clamp(12px, 3vw, 20px);

        }

        .navbar {

            background: rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(10px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.2);

            padding: clamp(12px, 2vw, 15px) clamp(15px, 3vw, 20px);

            position: fixed;

            top: 0;

            width: 100%;

            z-index: 1000;

        }

        .navbar-content {

            display: flex;

            justify-content: space-between;

            align-items: center;

            max-width: 1200px;

            margin: 0 auto;

        }

        .navbar-brand {

            color: white;

            font-size: clamp(1.2rem, 2vw, 1.5rem);

            font-weight: bold;

            display: flex;

            align-items: center;

            gap: clamp(8px, 1vw, 10px);

            text-decoration: none;

        }

        .navbar-links {

            display: flex;

            gap: clamp(15px, 3vw, 30px);

            align-items: center;

            list-style: none;

        }

        .navbar-links a {

            color: white;

            text-decoration: none;

            transition: all 0.3s ease;

            font-size: clamp(0.8rem, 1.5vw, 0.95rem);

            display: flex;

            align-items: center;

            gap: clamp(6px, 1vw, 8px);

        }

        .navbar-links a:hover {

            opacity: 0.7;

        }

        .navbar-btn {

            background: white;

            color: #667eea;

            padding: clamp(6px, 1vw, 8px) clamp(15px, 2vw, 20px);

            border-radius: 50px;

            text-decoration: none;

            font-weight: bold;

            transition: transform 0.3s ease;

        }

        .navbar-btn:hover {

            transform: translateY(-2px);

        }

        .navbar-btn.login {

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

            color: white;

        }

        .navbar-btn.login:hover {

            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);

        }

        .navbar-btn.login {

            background: white;

            color: #667eea;

        }

        .container {

            background: white;

            border-radius: 20px;

            padding: clamp(30px, 5vw, 50px);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

            width: 100%;

            max-width: 450px;

            margin-top: clamp(60px, 8vw, 80px);

        }

        .signup-header {

            text-align: center;

            margin-bottom: clamp(30px, 5vw, 40px);

        }

        .signup-header h1 {

            color: #333;

            font-size: clamp(1.5rem, 3vw, 2rem);

            margin-bottom: clamp(8px, 1vw, 10px);

        }

        .signup-header p {

            color: #666;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .form-group {

            margin-bottom: clamp(18px, 3vw, 25px);

        }

        .form-group label {

            display: block;

            color: #333;

            font-weight: 600;

            margin-bottom: clamp(8px, 1vw, 10px);

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .form-group input {

            width: 100%;

            padding: clamp(11px, 2vw, 14px) clamp(12px, 2vw, 15px);

            border: 2px solid #ddd;

            border-radius: 10px;

            font-family: inherit;

            font-size: clamp(0.9rem, 1.5vw, 0.95rem);

            transition: all 0.3s ease;

        }

        .form-group input:focus {

            outline: none;

            border-color: #f093fb;

            box-shadow: 0 0 0 3px rgba(240, 147, 251, 0.1);

        }

        .signup-btn {

            width: 100%;

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

            color: white;

            border: none;

            padding: clamp(11px, 2vw, 14px);

            font-size: clamp(0.95rem, 1.5vw, 1.05rem);

            border-radius: 10px;

            cursor: pointer;

            font-weight: 600;

            transition: all 0.3s ease;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: clamp(8px, 1vw, 10px);

        }

        .signup-btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);

        }

        .signup-btn:active {

            transform: translateY(0);

        }

        .message {

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            text-align: center;

            font-weight: 500;

            display: none;

        }

        .message.error {

            background: #f8d7da;

            color: #721c24;

            border: 1px solid #f5c6cb;

            display: block;

        }

        .message.success {

            background: #d4edda;

            color: #155724;

            border: 1px solid #c3e6cb;

            display: block;

        }

        .login-link {

            text-align: center;

            margin-top: clamp(15px, 2vw, 20px);

            color: #666;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

        }

        .login-link a {

            color: #f5576c;

            text-decoration: none;

            font-weight: 600;

            transition: color 0.3s ease;

        }

        .login-link a:hover {

            color: #f093fb;

            text-decoration: underline;

        }

        .loading {

            display: none;

            opacity: 0.6;

            pointer-events: none;

        }

        .spinner {

            display: inline-block;

            width: 20px;

            height: 20px;

            border: 3px solid rgba(255, 255, 255, 0.3);

            border-radius: 50%;

            border-top-color: white;

            animation: spin 0.8s linear infinite;

        }

        .password-strength {

            margin-top: clamp(8px, 1vw, 10px);

            height: 4px;

            background: #ddd;

            border-radius: 2px;

            overflow: hidden;

        }

        .password-strength-fill {

            height: 100%;

            width: 0%;

            background: #ddd;

            transition: all 0.3s ease;

        }

        .password-strength-fill.weak {

            width: 33%;

            background: #f5576c;

        }

        .password-strength-fill.fair {

            width: 66%;

            background: #ffc107;

        }

        .password-strength-fill.strong {

            width: 100%;

            background: #28a745;

        }

        .strength-text {

            font-size: clamp(0.7rem, 1.2vw, 0.75rem);

            margin-top: clamp(4px, 1vw, 5px);

            color: #666;

        }

        /* Role Selector Styles */

        .role-selector {

            display: flex;

            gap: clamp(10px, 2vw, 15px);

            margin-bottom: clamp(20px, 3vw, 30px);

            border-bottom: 2px solid #ddd;

            padding: 0 0 clamp(15px, 2vw, 20px) 0;

        }

        .role-btn {

            flex: 1;

            padding: clamp(10px, 1.5vw, 12px) clamp(15px, 2vw, 20px);

            border: none;

            background: transparent;

            color: #999;

            font-weight: 600;

            cursor: pointer;

            transition: all 0.3s ease;

            border-bottom: 3px solid transparent;

            font-size: clamp(0.85rem, 1.5vw, 0.95rem);

            display: flex;

            align-items: center;

            justify-content: center;

            gap: clamp(6px, 1vw, 8px);

        }

        .role-btn:hover {

            color: #f5576c;

        }

        .role-btn.active {

            color: #f5576c;

            border-bottom-color: #f5576c;

        }

        .role-btn.admin.active {

            color: #f093fb;

            border-bottom-color: #f093fb;

        }

        /* Signup Form Styles */

        .signup-form {

            display: none;

        }

        .signup-form.active {

            display: block;

            animation: fadeIn 0.3s ease;

        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(10px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        .admin-btn {

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

        }

        .admin-btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);

        }

        @keyframes spin {

            to {
                transform: rotate(360deg);
            }

        }

        @media (max-width: 1024px) {

            .container {

                max-width: 500px;

            }

            .navbar-links {

                gap: clamp(12px, 2vw, 20px);

            }

        }

        @media (max-width: 768px) {

            .navbar-links {

                gap: clamp(8px, 1.5vw, 15px);

                flex-wrap: wrap;

            }

            .container {

                padding: clamp(25px, 4vw, 40px);

                margin-top: clamp(70px, 10vw, 90px);

            }

            .signup-header h1 {

                font-size: clamp(1.3rem, 2.5vw, 1.7rem);

            }

        }

        @media (max-width: 480px) {

            .container {

                padding: clamp(20px, 3vw, 30px);

                margin-top: clamp(60px, 8vw, 70px);

                max-width: 100%;

            }

            .signup-header h1 {

                font-size: clamp(1.2rem, 2.5vw, 1.5rem);

            }

            .navbar-links {

                gap: 8px;

            }

        }

        @media (max-width: 360px) {

            .navbar-brand {

                font-size: clamp(1rem, 2vw, 1.2rem);

            }

            .navbar-links a {

                font-size: clamp(0.7rem, 1vw, 0.8rem);

            }

            .signup-header h1 {

                font-size: clamp(1.1rem, 2vw, 1.3rem);

            }

            .container {

                margin-top: clamp(55px, 8vw, 60px);

            }

        }

        /* Footer Styles */

        .app-footer {

            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

            color: #e0e0e0;

            padding: clamp(30px, 5vw, 50px) 0;

            margin-top: auto;

            border-top: 1px solid rgba(102, 126, 234, 0.2);

        }

        .footer-wrapper {

            max-width: 1200px;

            margin: 0 auto;

            padding: 0 clamp(15px, 3vw, 30px);

        }

        .footer-content {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: clamp(30px, 5vw, 50px);

            margin-bottom: clamp(25px, 5vw, 40px);

        }

        .footer-column h4 {

            color: white;

            font-size: clamp(1rem, 1.5vw, 1.2rem);

            margin-bottom: clamp(15px, 2vw, 20px);

            font-weight: 600;

        }

        .footer-column ul {

            list-style: none;

        }

        .footer-column ul li {

            margin-bottom: clamp(10px, 1vw, 12px);

        }

        .footer-column a {

            color: #b0b0b0;

            text-decoration: none;

            transition: color 0.3s ease;

            display: flex;

            align-items: center;

            gap: 8px;

        }

        .footer-column a:hover {

            color: #667eea;

        }

        .footer-description {

            color: #b0b0b0;

            font-size: clamp(0.85rem, 1vw, 0.95rem);

            line-height: 1.6;

            margin-bottom: clamp(15px, 2vw, 20px);

        }

        .footer-brand {

            display: flex;

            align-items: center;

            gap: clamp(8px, 1vw, 10px);

            font-size: clamp(1.1rem, 1.5vw, 1.3rem);

            font-weight: bold;

            color: white;

            margin-bottom: clamp(15px, 2vw, 20px);

        }

        .footer-brand i {

            color: #667eea;

            font-size: clamp(1.2rem, 2vw, 1.5rem);

        }

        .social-icon {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            width: 40px;

            height: 40px;

            background: rgba(102, 126, 234, 0.2);

            border-radius: 50%;

            color: #667eea;

            text-decoration: none;

            transition: all 0.3s ease;

            font-size: 1.1rem;

        }

        .social-icon:hover {

            transform: translateY(-3px);

            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);

        }

        .footer-bottom {

            text-align: center;

            padding: 20px 0;

            border-top: 1px solid rgba(102, 126, 234, 0.2);

            margin-top: 30px;

        }

        .footer-bottom p {

            margin: 0;

            color: #b0b0b0;

            font-size: clamp(0.8rem, 1vw, 0.9rem);

        }

        .footer-bottom a {

            color: #667eea;

            text-decoration: none;

            transition: color 0.3s ease;

        }

        .footer-bottom a:hover {

            color: #764ba2;

            text-decoration: underline;

        }
    </style>

</head>

<body>

    <nav class="navbar">

        <div class="navbar-content">

            <a href="/" class="navbar-brand">

                <i class="fas fa-robot"></i> Smart Vision AI

            </a>

            <ul class="navbar-links">
                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/detection"><i class="fas fa-gears"></i> Detection</a></li>
                <li><a href="/features"><i class="fas fa-sparkles"></i> Features</a></li>
                <li><a href="/about"><i class="fas fa-info-circle"></i> About</a></li>
                <li><a href="/contact"><i class="fas fa-envelope"></i> Contact</a></li>
                <a href="/login_page" class="nav-cta">Get Started <i class="fas fa-arrow-right"></i></a>
            </ul>
        </div>

    </nav>

    <div class="container">

        <div class="signup-header">

            <h1><i class="fas fa-user-plus"></i> Create Account</h1>

            <p>Join Smart Vision AI today</p>

        </div>

        <!-- Role Selector -->

        <div class="role-selector">

            <button class="role-btn active" id="studentRoleBtn" onclick="switchRole('student')">

                <i class="fas fa-user-graduate"></i> Student

            </button>

            <button class="role-btn" id="adminRoleBtn" onclick="switchRole('admin')">

                <i class="fas fa-user-shield"></i> Administrator

            </button>

        </div>

        <!-- Student Signup Form -->

        <form id="studentForm" onsubmit="handleSignup(event, 'student')" class="signup-form active">

            <div class="form-group">

                <label for="studentEmail">Email Address</label>

                <input type="email" id="studentEmail" placeholder="Enter your email" required>

            </div>

            <div class="form-group">

                <label for="studentPassword">Password</label>

                <input type="password" id="studentPassword" placeholder="Create a strong password" required
                    oninput="checkPasswordStrength('student')">

                <div class="password-strength">

                    <div class="password-strength-fill" id="studentStrengthFill"></div>

                </div>

                <div class="strength-text" id="studentStrengthText"></div>

            </div>

            <button type="submit" class="signup-btn" id="studentSignupBtn">

                <i class="fas fa-user-check"></i> Create Student Account

            </button>

        </form>

        <!-- Admin Signup Form -->

        <form id="adminForm" onsubmit="handleSignup(event, 'admin')" class="signup-form">

            <div class="form-group">

                <label for="adminEmail">Admin Email Address</label>

                <input type="email" id="adminEmail" placeholder="Enter admin email" required>

            </div>

            <div class="form-group">

                <label for="adminPassword">Admin Password</label>

                <input type="password" id="adminPassword" placeholder="Create a strong password" required
                    oninput="checkPasswordStrength('admin')">

                <div class="password-strength">

                    <div class="password-strength-fill" id="adminStrengthFill"></div>

                </div>

                <div class="strength-text" id="adminStrengthText"></div>

            </div>

            <div class="form-group">

                <label for="adminKey">Admin Access Key</label>

                <input type="password" id="adminKey" placeholder="Enter admin access key (required)" required>

            </div>

            <button type="submit" class="signup-btn admin-btn" id="adminSignupBtn">

                <i class="fas fa-user-check"></i> Create Admin Account

            </button>

        </form>

        <div class="message" id="msg"></div>

        <div class="login-link">

            Already have an account? <a href="/login_page">Login here</a>

        </div>

    </div>

    <script>

        let currentRole = 'student';

        function switchRole(role) {

            currentRole = role;

            // Update buttons

            document.getElementById('studentRoleBtn').classList.toggle('active');

            document.getElementById('adminRoleBtn').classList.toggle('active');

            // Update forms

            document.getElementById('studentForm').classList.toggle('active');

            document.getElementById('adminForm').classList.toggle('active');

            // Clear messages

            document.getElementById('msg').className = 'message';

            document.getElementById('msg').innerHTML = '';

        }

        function checkPasswordStrength(role = 'student') {

            const passwordId = role === 'student' ? 'studentPassword' : 'adminPassword';

            const fillId = role === 'student' ? 'studentStrengthFill' : 'adminStrengthFill';

            const textId = role === 'student' ? 'studentStrengthText' : 'adminStrengthText';

            const password = document.getElementById(passwordId).value;

            const fill = document.getElementById(fillId);

            const text = document.getElementById(textId);

            let strength = 0;

            if (password.length >= 8) strength++;

            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;

            if (/[0-9]/.test(password)) strength++;

            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            fill.className = 'password-strength-fill';

            if (password.length === 0) {

                text.textContent = '';

            } else if (strength < 2) {

                fill.classList.add('weak');

                text.textContent = 'Weak password';

            } else if (strength < 4) {

                fill.classList.add('fair');

                text.textContent = 'Fair password';

            } else {

                fill.classList.add('strong');

                text.textContent = 'Strong password';

            }

        }

        function handleSignup(event, role) {

            event.preventDefault();

            const emailInput = role === 'student' ? 'studentEmail' : 'adminEmail';

            const passwordInput = role === 'student' ? 'studentPassword' : 'adminPassword';

            const buttonId = role === 'student' ? 'studentSignupBtn' : 'adminSignupBtn';

            const email = document.getElementById(emailInput).value.trim();

            const password = document.getElementById(passwordInput).value;

            const signupBtn = document.getElementById(buttonId);

            const msgDiv = document.getElementById('msg');

            if (!email || !password) {

                msgDiv.className = 'message error';

                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill in all fields';

                return;

            }

            if (password.length < 6) {

                msgDiv.className = 'message error';

                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters';

                return;

            }

            // Additional validation for admin

            let adminKey = null;

            if (role === 'admin') {

                adminKey = document.getElementById('adminKey').value;

                if (!adminKey) {

                    msgDiv.className = 'message error';

                    msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Admin access key is required';

                    return;

                }

            }

            // Show loading state

            signupBtn.classList.add('loading');

            const btnText = role === 'student' ? 'Creating account...' : 'Verifying access...';

            signupBtn.innerHTML = '<div class="spinner"></div> ' + btnText;

            // Determine endpoint based on role

            const endpoint = role === 'student' ? '/student_signup' : '/admin_signup';

            const data = {

                email: email,

                password: password

            };

            if (role === 'admin') {

                data.access_key = adminKey;

            }

            fetch(endpoint, {

                method: 'POST',

                headers: { 'Content-Type': 'application/json' },

                body: JSON.stringify(data)

            })

                .then(res => res.json())

                .then(data => {

                    signupBtn.classList.remove('loading');

                    const btnText = role === 'student' ? '<i class="fas fa-user-check"></i> Create Student Account' : '<i class="fas fa-user-check"></i> Create Admin Account';

                    signupBtn.innerHTML = btnText;

                    if (data.success) {

                        msgDiv.className = 'message success';

                        msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> Account created! Redirecting to login...';

                        localStorage.setItem('userRole', role);

                        setTimeout(() => {

                            window.location.href = "/login_page";

                        }, 1500);

                    } else {

                        msgDiv.className = 'message error';

                        msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (data.message || 'Signup failed');

                    }

                })

                .catch(error => {

                    signupBtn.classList.remove('loading');

                    const btnText = role === 'student' ? '<i class="fas fa-user-check"></i> Create Student Account' : '<i class="fas fa-user-check"></i> Create Admin Account';

                    signupBtn.innerHTML = btnText;

                    msgDiv.className = 'message error';

                    msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Please try again.';

                    console.error('Error:', error);

                });

        }

    </script>

</body>

</html>
